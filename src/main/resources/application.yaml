spring:
  application:
    name: smartguard

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartguard}
    username: ${SPRING_DATASOURCE_USERNAME:smartguard_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me_postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none       # Flyway cuida do schema, JPA só valida
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:change_me_redis}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: smartguard-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "br.leetjourney.smartguard.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ── JWT ─────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:change_me_jwt_secret_must_be_at_least_256_bits}
  expiration-ms: 3600000          # 1 hora (access token)
  refresh-expiration-ms: 604800000 # 7 dias (refresh token)

# ── Actuator / Observabilidade ───────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    br.leetjourney.smartguard: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG