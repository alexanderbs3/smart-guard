global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: smartguard

scrape_configs:
  - job_name: smartguard-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'smartguard-app:8080' ]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: prometheus
    static_configs:
      - targets: [ 'localhost:9090' ]