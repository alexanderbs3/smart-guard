version: "3.9"

# Stack de observabilidade — rode separado do docker-compose.yml principal
# Uso: docker compose -f docker-compose.observability.yml up -d

services:

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: smartguard-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - smartguard-net

  grafana:
    image: grafana/grafana:10.3.1
    container_name: smartguard-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - smartguard-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  smartguard-net:
    external: true
    name: smartguard_smartguard-net